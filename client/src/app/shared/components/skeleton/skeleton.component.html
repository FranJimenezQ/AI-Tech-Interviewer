<div class="skeleton-container">

  <!-- Header skeleton -->
  <div class="skeleton-header">
    <div class="skeleton-block" style="width: 120px; height: 24px;"></div>
    <div class="skeleton-block" style="width: 90px; height: 32px; border-radius: 8px;"></div>
  </div>

  <!-- Match summary card skeleton -->
  <div class="skeleton-card">
    <div class="skeleton-card-header">
      <div class="skeleton-block" style="width: 140px; height: 20px;"></div>
      <div class="skeleton-block" style="width: 80px; height: 48px;"></div>
    </div>
    <div class="skeleton-block" style="width: 100%; height: 16px; margin-top: 8px;"></div>
    <div class="skeleton-block" style="width: 85%; height: 16px;"></div>
    <div class="skeleton-block" style="width: 70%; height: 16px;"></div>

    <div class="skeleton-metrics">
      <div class="skeleton-metric">
        <div class="skeleton-block" style="width: 48px; height: 24px;"></div>
        <div class="skeleton-block" style="width: 80px; height: 14px;"></div>
      </div>
      <div class="skeleton-metric">
        <div class="skeleton-block" style="width: 72px; height: 24px;"></div>
        <div class="skeleton-block" style="width: 60px; height: 14px;"></div>
      </div>
      <div class="skeleton-metric">
        <div class="skeleton-block" style="width: 56px; height: 24px;"></div>
        <div class="skeleton-block" style="width: 90px; height: 14px;"></div>
      </div>
    </div>
  </div>

  <!-- Suggested changes card skeleton -->
  <div class="skeleton-card">
    <div class="skeleton-block" style="width: 160px; height: 20px;"></div>

    @for (item of [1,2,3,4,5]; track item) {
      <div class="skeleton-change">
        <div class="skeleton-block skeleton-circle"></div>
        <div class="skeleton-change-content">
          <div class="skeleton-block" style="width: 60%; height: 16px;"></div>
          <div class="skeleton-block" style="width: 100%; height: 14px;"></div>
          <div class="skeleton-block" style="width: 80%; height: 14px;"></div>
        </div>
      </div>
    }
  </div>

</div>
